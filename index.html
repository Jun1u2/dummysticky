<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SweetStock - Dessert Store Management</title>
    <link rel="stylesheet" href="index.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="login-screen">
        <div class="login-card">
            <div class="logo">
                <span class="icon">🍰</span>
                <span class="text">SweetStock</span>
            </div>
            <p>Please log in to continue</p>
            <div class="form-group" style="text-align: left;">
                <label>Username</label>
                <input type="text" id="login-username" class="form-control" placeholder="Enter username">
            </div>
            <div class="form-group" style="text-align: left;">
                <label>Password</label>
                <input type="password" id="login-password" class="form-control" placeholder="Enter password">
            </div>
            <button class="btn btn-primary" onclick="app.login()">Log In</button>
            <div id="login-error" class="text-danger mt-4" style="color: var(--danger); display: none;">Invalid credentials</div>
        </div>
    </div>

    <div id="app" class="hidden">
        <nav id="sidebar">
            <div class="logo">
                <span class="icon">🍰</span>
                <span class="text">SweetStock</span>
            </div>
            <ul class="nav-links">
                <li><a href="#" data-page="dashboard" class="active">Dashboard</a></li>
                <li><a href="#" data-page="inventory">Inventory</a></li>
                <li><a href="#" data-page="products">Products</a></li>
                <li><a href="#" data-page="sales">Sales (POS)</a></li>
                <li><a href="#" data-page="reports">Reports</a></li>
                <li><a href="#" data-page="settings">Settings</a></li>
            </ul>
        </nav>
        
        <main id="main-content">
            <header>
                <div class="header-left">
                    <button id="mobile-menu-btn" class="mobile-only">☰</button>
                    <h1 id="page-title">Dashboard</h1>
                </div>
                <div class="user-info">
                    <span class="user-avatar" id="header-avatar">A</span>
                    <span class="user-role" id="header-role">Admin</span>
                    <button class="btn btn-outline btn-sm" style="padding: 0.25rem 0.5rem; font-size: 0.8rem;" onclick="app.logout()">Logout</button>
                </div>
            </header>
            <div id="page-container">
                <!-- Content injected here by app.js -->
            </div>
        </main>
    </div>
    
    <div id="modal-container" class="hidden">
        <!-- Modals injected here -->
    </div>

    <!-- Scripts -->
    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
